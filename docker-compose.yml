services:
  mysql:
    image: mysql:8.0
    container_name: rewearit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rewearit
      MYSQL_USER: rewearit
      MYSQL_PASSWORD: rewearit123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: rewearit-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: rewearit
      DB_USERNAME: rewearit
      DB_PASSWORD: rewearit123
      SANCTUM_STATEFUL_DOMAINS: localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api:/var/www/html
    command: >
      sh -c "
        php artisan migrate:fresh --force --seed &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  frontend:
    build:
      context: ./my-project
      dockerfile: Dockerfile
    container_name: rewearit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./my-project:/app
      - /app/node_modules

volumes:
  mysql_data: